<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karmelo | Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://apis.google.com/js/platform.js"></script>

    <style>
        /* SZYBKI CSS RESET I STYLE GŁÓWNE */
        :root { --red: #ff0000; --bg: #000; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* BACKGROUND PARTICLES */
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* NAWIGACJA */
        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 1000; cursor: pointer; font-size: 24px; background: var(--glass); padding: 10px; border-radius: 8px; backdrop-filter: blur(10px); }
        #side-menu { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: rgba(5,5,5,0.98); z-index: 1100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 60px 30px; border-right: 1px solid var(--red); }
        #side-menu.active { left: 0; }
        .menu-items a { display: block; color: #fff; text-decoration: none; font-size: 1.2rem; margin-bottom: 25px; font-weight: 700; transition: 0.3s; }
        .menu-items a:hover { color: var(--red); padding-left: 10px; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        /* HERO SECTION */
        .container { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--red); box-shadow: 0 0 30px rgba(255,0,0,0.3); margin-bottom: 20px; }
        .main-title { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin-bottom: 10px; }
        .nickname { color: var(--red); text-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .tagline { font-size: 1rem; letter-spacing: 4px; color: #888; font-weight: 700; text-transform: uppercase; }

        /* STATYSTYKI */
        .hero-stats { display: flex; gap: 30px; margin: 40px 0; align-items: center; flex-wrap: wrap; justify-content: center; }
        .h-stat { display: flex; flex-direction: column; align-items: center; }
        .pro-tag strong { font-size: 1.5rem; display: block; }
        .pro-tag span { color: var(--red); font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; }

        /* LINKI */
        .links-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
        .card { background: var(--glass); padding: 18px; border-radius: 12px; text-decoration: none; color: #fff; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { border-color: var(--red); background: rgba(255,0,0,0.05); transform: translateY(-5px); }

        /* SEKCJE */
        .section { position: relative; z-index: 10; padding: 100px 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .section-title { font-size: 2rem; text-align: center; margin-bottom: 60px; text-transform: uppercase; letter-spacing: 5px; color: var(--red); }

        /* SHORTSY - FIX GRIDA */
        .shorts-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            justify-items: center;
        }

            width: 100%;
