<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMELO | GALAXY PORTFOLIO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0000;
            --twitch: #9146ff;
            --bg: #030303;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 0, 0, 0.2);
            --glow: 0 0 20px rgba(255, 0, 0, 0.4);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
        }

        /* TŁO I CZĄSTECZKI */
        #particles-js { position: fixed; inset: 0; z-index: 1; }
        .scanline {
            position: fixed; inset: 0; height: 100%; width: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 51%);
            background-size: 100% 4px; pointer-events: none; z-index: 2000;
        }

        /* WYSUWANE MENU (SIDEBAR) */
        .side-nav {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px);
            z-index: 3000; transition: var(--transition);
            border-left: 2px solid var(--primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .side-nav.active { right: 0; box-shadow: -10px 0 50px rgba(255,0,0,0.2); }
        .nav-link {
            color: #fff; text-decoration: none; font-size: 1.5rem; font-family: 'Syncopate';
            margin: 20px 0; transition: 0.3s; text-transform: uppercase;
        }
        .nav-link:hover { color: var(--primary); transform: skewX(-10px); }

        .menu-trigger {
            position: fixed; top: 30px; right: 30px; z-index: 3001;
            background: var(--primary); width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: var(--glow);
        }

        /* GŁÓWNY CONTENT */
        .container { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .avatar-wrapper {
            position: relative; width: 200px; height: 200px; margin-bottom: 40px;
        }
        .avatar-wrapper::after {
            content: ''; position: absolute; inset: -10px; border: 2px solid var(--primary);
            border-radius: 50%; animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; }

        .glitch-title {
            font-family: 'Syncopate'; font-size: clamp(2rem, 10vw, 5rem);
            text-transform: uppercase; line-height: 1; margin-bottom: 20px;
        }
        .red-glow { color: var(--primary); text-shadow: var(--glow); }

        /* SOCIALE - Z TWITCHEM */
        .social-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; width: 100%; margin-top: 40px;
        }
        .s-card {
            background: var(--card); border: 1px solid var(--border); padding: 25px;
            border-radius: 15px; text-decoration: none; color: #fff; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .s-card:hover { background: rgba(255,0,0,0.1); border-color: #fff; transform: translateY(-10px) scale(1.05); }
        .s-card i { font-size: 2rem; }

        /* SEKCJA VIDEO */
        .section-title { font-family: 'Syncopate'; margin: 80px 0 40px; font-size: 2rem; border-bottom: 2px solid var(--primary); display: inline-block; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .v-item { aspect-ratio: 9/16; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .v-item iframe { width: 100%; height: 100%; border: none; }

        /* MODAL KONTAKTOWY */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 5000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111; width: 90%; max-width: 500px; padding: 40px;
            border-radius: 30px; border: 1px solid var(--primary); position: relative;
        }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; }

        input, textarea {
            width: 100%; background: #222; border: 1px solid #444; padding: 15px;
            margin-bottom: 15px; color: #fff; border-radius: 10px; font-family: inherit;
        }
        .send-btn {
            width: 100%; background: var(--primary); border: none; padding: 15px;
            color: #fff; font-weight: 900; border-radius: 10px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* FOOTER */
        footer { padding: 100px 0 50px; text-align: center; color: #444; }

    </style>
</head>
<body>

    <div class="scanline"></div>
    <div id="particles-js"></div>

    <div class="menu-trigger" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>
    <div class="side-nav" id="sidebar">
        <a href="#" class="nav-link" onclick="toggleMenu()">Start</a>
        <a href="#video" class="nav-link" onclick="toggleMenu()">Wideo</a>
        <a href="javascript:void(0)" class="nav-link" onclick="toggleModal()">Kontakt</a>
    </div>

    <div class="modal" id="contactModal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal()">&times;</span>
            <h2 style="font-family:'Syncopate'; margin-bottom: 20px;">Napisz do mnie</h2>
            <form action="https://formspree.io/f/xqeyzypj" method="POST">
                <input type="text" name="name" placeholder="Twoje Imię" required>
                <input type="email" name="email" placeholder="E-mail" required>
                <textarea name="message" rows="5" placeholder="Twoja wiadomość..."></textarea>
                <button type="submit" class="send-btn">Wyślij sygnał</button>
            </form>
        </div>
    </div>

    <div class="container">
        
        <section class="hero">
            <div class="avatar-wrapper">
                <img src="profil.jpg" class="avatar-img" alt="KARMELO">
            </div>
            <h1 class="glitch-title">TU <span class="red-glow">KARMELO</span></h1>
            <p style="letter-spacing: 10px; font-weight: 300; color: #888;">CREATOR • ACTOR • EDITOR</p>

            <div class="social-bar">
                <a href="https://youtube.com/@kvrmelo" class="s-card" target="_blank">
                    <i class="fab fa-youtube" style="color:red"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://tiktok.com/@kvrmelo" class="s-card" target="_blank">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://twitch.tv/twoj-twitch" class="s-card" target="_blank">
                    <i class="fab fa-twitch" style="color:var(--twitch)"></i>
                    <span>Twitch</span>
                </a>
                <a href="javascript:void(0)" class="s-card" onclick="toggleModal()">
                    <i class="fas fa-envelope"></i>
                    <span>Kontakt</span>
                </a>
            </div>
        </section>

        <section id="video">
            <h2 class="section-title">OSTATNIE FILMY</h2>
            <div class="video-grid">
                <div class="v-item"><iframe src="https://www.youtube.com/embed/XQrDdlafN00"></iframe></div>
                <div class="v-item"><iframe src="https://www.youtube.com/embed/DZ8vyfdgACc"></iframe></div>
                <div class="v-item"><iframe src="https://www.youtube.com/embed/0xJZrCEK_xY"></iframe></div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 KARMELO. STAY RED.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // MENU I MODAL LOGIC
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        function toggleModal() {
            document.getElementById('contactModal').classList.toggle('active');
        }

        // PARTICLES
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ff0000" },
                shape: { type: "circle" },
                opacity: { value: 0.5, anim: { enable: true, speed: 1, opacity_min: 0.1 } },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: "#ff0000", opacity: 0.2, width: 1 },
                move: { enable: true, speed: 3, direction: "none", random: false, straight: false }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: "repulse" } }
            }
        });
    </script>
</body>
</html>
